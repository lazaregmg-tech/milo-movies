    .nav-links a {

        text-decoration: none;
        font-size: 15px;

    }
    .nav-links a:hover,

    }

    .movie-card img {
        width: 100%;
        height: 320x;

        display: block;
        border-radius: 20px 20px 0 0;;
    }
    .movie-card .title {

        font-size: 16px;
    }
    .movie-card:hover {
